name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # cada 14 minutos (Render spin-down = 15 min)
  workflow_dispatch:           # también se puede lanzar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://scoutai-b7gn.onrender.com/api/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  El servidor respondió con HTTP $STATUS"
          else
            echo "✅ Servidor activo"
          fi
